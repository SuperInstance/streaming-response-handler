name: Validate Package

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install validation tools
      run: |
        python -m pip install --upgrade pip
        pip install pyroma check-manifest twine

    - name: Check package structure
      run: |
        check-manifest

    - name: Validate package quality
      run: |
        pyroma .

    - name: Validate package can be built
      run: |
        pip install build
        python -m build
        twine check dist/*
